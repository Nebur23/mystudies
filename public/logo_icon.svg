<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="#ffffff"/>

  <!-- Left bold upward sweep -->
  <path d="M 24 78
             C 24 78, 30 63, 40 46
             C 48 32, 55 21, 60 15"
        stroke="#1A56DB" stroke-width="13" stroke-linecap="round"
        fill="none"/>

  <!-- Right accent stroke -->
  <path d="M 60 15
             C 67 26, 73 43, 69 60
             C 66 72, 58 82, 52 88"
        stroke="#F97316" stroke-width="9" stroke-linecap="round"
        fill="none"/>

  <!-- Apex dot -->
  <circle cx="60" cy="15" r="7" fill="#1A56DB"/>
  <!-- Base accent dot -->
  <circle cx="52" cy="88" r="4.5" fill="#F97316"/>
</svg>
